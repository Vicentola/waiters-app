<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Atendente</title>
</head>
<body>
    <h1>Cadastro de Atendente</h1>
    <a href="/">Voltar</a>

    <form method="POST" action="/cadastrar/atendente">
        <label>Nome:</label><br>
        <input type="text" name="nome"><br><br>

        <label>Anos de experiência:</label><br>
        <input type="number" name="experiencia"><br><br>

        <label>Segmento:</label><br>
        <input type="text" name="segmento"><br><br>

        <button type="submit">Cadastrar</button>
    </form>
</body>
</html>
